name: Chef License Debug
on:
  push:
    branches: [chef-license-debug]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Is the licensing API consistently wrong from this runner?
        env:
          K: ${{ secrets.CHEF_LICENSE_KEY }}
        run: |
          echo "egress IP: $(curl -s https://api.ipify.org || true)"
          for i in 1 2 3; do
            curl -sS -w ' [http=%{http_code}]\n' \
              "https://services.chef.io/licensing/v1/validate?licenseId=${K}&version=2" || true
            sleep 2
          done

      - name: 💿 Install Inspec
        run: curl https://omnitruck.chef.io/install.sh | sudo bash -s -- -P inspec

      - name: A — inspec exec WITHOUT a licence key (omnitruck build)
        env:
          CHEF_LICENSE: accept-no-persist
        run: |
          inspec exec test --reporter cli && echo "RESULT_A=PASS" || echo "RESULT_A=FAIL(exit $?)"

      - name: B — inspec exec WITH the licence key
        env:
          CHEF_LICENSE: accept-no-persist
          CHEF_LICENSE_KEY: ${{ secrets.CHEF_LICENSE_KEY }}
        run: |
          inspec exec test --reporter cli && echo "RESULT_B=PASS" || echo "RESULT_B=FAIL(exit $?)"
